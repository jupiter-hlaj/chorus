AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Chorus - YouTube Opinion Aggregator

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]
  YoutubeApiKey:
    Type: String
    NoEcho: true
    Description: YouTube Data API v3 key
  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: Google Gemini API key

Globals:
  Function:
    Runtime: python3.13
    Architectures: [arm64]
    MemorySize: 512
    Timeout: 60
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        LOG_LEVEL: !Ref LogLevel
        YOUTUBE_API_KEY: !Ref YoutubeApiKey
        GEMINI_API_KEY: !Ref GeminiApiKey
        MAX_VIDEOS: "5"
        MAX_TRANSCRIPT_MINUTES: "30"
        CACHE_TTL_SECONDS: "3600"

Resources:
  ChorusApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  ChorusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.app.handler
      CodeUri: .
      Description: Chorus main app - search, transcribe, synthesize
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChorusApi
            Path: /
            Method: GET
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChorusApi
            Path: /health
            Method: GET
        Search:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChorusApi
            Path: /search
            Method: POST

Outputs:
  ChorusApiUrl:
    Description: Chorus API URL
    Value: !Sub "https://${ChorusApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
