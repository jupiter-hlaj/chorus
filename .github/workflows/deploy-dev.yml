name: Deploy to Dev

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_OIDC_ROLE_ARN }}
          aws-region: ca-central-1

      - uses: aws-actions/setup-sam@v2
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }

      - name: SAM Build
        run: sam build --no-cached --template template.yaml

      - name: SAM Deploy (dev)
        run: |
          sam deploy \
            --config-env dev \
            --parameter-overrides \
              YoutubeApiKey=${{ secrets.YOUTUBE_API_KEY }} \
              GeminiApiKey=${{ secrets.GEMINI_API_KEY }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Smoke test
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name chorus-dev \
            --query "Stacks[0].Outputs[?OutputKey=='ChorusApiUrl'].OutputValue" \
            --output text \
            --region ca-central-1)
          curl -f "$API_URL/health" || exit 1
